<!DOCTYPE html>
<html>
<body>
    <h3>Debug de Carga JSON</h3>
    <input type="file" id="file-test" accept=".json" />
    <pre id="debug-log" style="background:#000; color:#0f0; padding:10px;"></pre>

    <script>
        document.getElementById('file-test').addEventListener('change', function(e) {
            const log = document.getElementById('debug-log');
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.onload = function(evt) {
                try {
                    const data = JSON.parse(evt.target.result);
                    log.innerText = `ÉXITO: Se cargaron ${data.length} registros.\n`;
                    log.innerText += `Estructura del primer registro (Keys): ${Object.keys(data[0]).join(', ')}\n`;
                    log.innerText += `Ejemplo: ${JSON.stringify(data[0], null, 2)}`;
                    console.log("Datos cargados:", data);
                } catch (err) {
                    log.innerText = `ERROR: ${err.message}\n` + 
                                   `Revisá si el JSON es válido o si es una lista (array).`;
                }
            };
            reader.readAsText(file);
        });
    </script>
</body>
</html>
